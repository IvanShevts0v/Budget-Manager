spring:
  application:
    name: budget-manager

  datasource:
    url: jdbc:postgresql://localhost:5432/budgetdb
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: ${dbpassword}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: true
  sql:
    init:
      mode: always

server:
  port: 8080